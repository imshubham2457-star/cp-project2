<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Cara India</title>
    <meta name="description" content="Enter your shipping address and continue to secure dummy payment on Cara India checkout." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="header">
      <a href="index.html"><img src="img/logo.png" class="logo" alt="Cara India logo" /></a>
      <div>
        <ul id="navbar">
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a class="active" href="checkout.html">Checkout</a></li>
          <li id="lg-bag"><a href="cart.html">Cart</a></li>
          <a href="#" id="close">X</a>
        </ul>
      </div>
      <div id="mobile"><a href="cart.html">Cart</a><i id="bar" class="bx bx-menu"></i></div>
    </section>

    <section class="checkout-wrap section-p1">
      <div class="checkout-card">
        <h2>Checkout Address (India)</h2>
        <form id="checkout-form">
          <input id="full-name" type="text" placeholder="Full Name" required />
          <input id="email" type="email" placeholder="Email" required />
          <div class="mobile-prefix">
            <span>+91</span>
            <input id="checkout-mobile" type="tel" maxlength="10" pattern="\d{10}" placeholder="10-digit mobile number" required />
          </div>
          <input id="pincode" type="text" maxlength="6" pattern="\d{6}" placeholder="Pincode (6-digit)" required />
          <input id="locality" type="text" placeholder="Locality" required />
          <input id="city" type="text" placeholder="City" required />
          <select id="state" required>
            <option value="">Select State</option>
            <option>Delhi</option><option>Maharashtra</option><option>Karnataka</option><option>Tamil Nadu</option>
            <option>Uttar Pradesh</option><option>Gujarat</option><option>Rajasthan</option><option>Punjab</option>
            <option>Haryana</option><option>West Bengal</option><option>Telangana</option><option>Kerala</option>
          </select>
          <input id="landmark" type="text" placeholder="Landmark" />
          <p class="checkout-total-line">Total: <strong id="checkout-total">₹0</strong></p>
          <button class="normal" type="submit">Proceed to Pay</button>
        </form>
      </div>
    </section>
    <footer class="section-p1"><div class="copyright"><p>© 2026, Cara India</p></div></footer>
    <script src="script.js"></script>
  </body>
</html>
