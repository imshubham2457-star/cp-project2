<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Cara India</title>
    <meta name="description" content="Login or create your Cara India account to manage orders, addresses, and checkout faster." />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="header">
      <a href="index.html"><img src="img/logo.png" class="logo" alt="Cara India logo" /></a>
      <div>
        <ul id="navbar">
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a class="active" href="login.html">Login</a></li>
          <li id="lg-bag"><a href="cart.html"><i class="bx bx-shopping-bag"></i></a></li>
          <a href="#" id="close"><i class="bx bx-x"></i></a>
        </ul>
      </div>
      <div id="mobile">
        <a href="cart.html"><i class="bx bx-shopping-bag"></i></a>
        <i id="bar" class="bx bx-menu"></i>
      </div>
    </section>

    <section class="auth-wrap section-p1">
      <div class="auth-card">
        <h2>Login / Sign-up</h2>
        <p>Welcome to Cara India</p>
        <form id="auth-form">
          <label for="auth-mode">Select Mode</label>
          <select id="auth-mode" required>
            <option value="login">Login</option>
            <option value="signup">Sign-up</option>
          </select>

          <label for="full-name-auth">Full Name</label>
          <input id="full-name-auth" type="text" placeholder="Enter your full name" required />

          <label for="email-auth">Email</label>
          <input id="email-auth" type="email" placeholder="Enter your email" required />

          <label for="mobile-number">Mobile Number</label>
          <div class="mobile-prefix">
            <span>+91</span>
            <input id="mobile-number" type="tel" maxlength="10" pattern="\d{10}" placeholder="9876543210" required />
          </div>

          <label for="password-auth">Password</label>
          <input id="password-auth" type="password" placeholder="Enter password" required />

          <button class="normal" id="auth-submit-btn" type="submit">Login</button>
        </form>
      </div>
    </section>

    <footer class="section-p1">
      <div class="copyright"><p>© 2026, Cara India</p></div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
